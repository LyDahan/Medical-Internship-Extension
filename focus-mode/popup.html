<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <style>
      body {
        width: 520px;
        padding: 16px;
        font-family: sans-serif;
      }
      h2 {
        margin: 0 0 12px;
        font-size: 16px;
      }
      #status {
        font-size: 13px;
        color: #888;
        margin-bottom: 10px;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 12px;
      }
      th {
        background: #f0f0f0;
        text-align: left;
        padding: 6px 8px;
        border-bottom: 2px solid #ccc;
      }
      td {
        padding: 6px 8px;
        border-bottom: 1px solid #eee;
        vertical-align: middle;
      }
      tr.selectable:hover { background: #e8f0fe; cursor: pointer; }
      tr.selected { background: #c2d7fb; }
      .badge {
        display: inline-block;
        padding: 2px 8px;
        border-radius: 10px;
        font-size: 11px;
        font-weight: bold;
      }
      .badge.available   { background: #d4edda; color: #155724; }
      .badge.unavailable { background: #f8d7da; color: #721c24; }
      .badge.other       { background: #fff3cd; color: #856404; }

      #schedule-panel {
        display: none;
        margin-top: 16px;
        padding: 12px;
        background: #f9f9f9;
        border: 1px solid #ddd;
        border-radius: 6px;
      }
      #schedule-panel h3 {
        margin: 0 0 8px;
        font-size: 13px;
      }
      #selected-label {
        font-size: 12px;
        color: #333;
        margin-bottom: 10px;
      }
      #schedule-panel input[type="datetime-local"] {
        width: 100%;
        padding: 6px;
        font-size: 13px;
        margin-bottom: 8px;
        box-sizing: border-box;
      }
      #schedule-btn {
        width: 100%;
        padding: 8px;
        background: #1a73e8;
        color: white;
        border: none;
        border-radius: 6px;
        font-size: 13px;
        cursor: pointer;
      }
      #schedule-btn:hover { background: #1558b0; }
      #confirm-msg {
        margin-top: 8px;
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <h2>Search for internship</h2>
    <div id="status">Loading rows...</div>

    <table id="results">
      <thead>
        <tr>
          <th>Hospital</th>
          <th>Specialty</th>
          <th>Date</th>
          <th>#</th>
          <th>Status</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>

    <div id="schedule-panel">
      <h3>Schedule auto-click</h3>
      <div id="selected-label"></div>
      <input type="datetime-local" id="schedule-time" />
      <button id="schedule-btn">Schedule</button>
      <div id="confirm-msg"></div>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
